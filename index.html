<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#fff9f0;--panel:#fff3e0}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;overflow:hidden;touch-action:manipulation}
header{background:linear-gradient(135deg,#ff6b9d,#ff9a3c);padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 12px rgba(255,107,157,.35);flex-shrink:0}
header h1{font-family:'Fredoka One',cursive;font-size:1.6rem;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.15)}
.star-count{background:rgba(255,255,255,.28);border-radius:30px;padding:4px 12px;color:#fff;font-weight:900;font-size:1rem}
.scene-bar{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;background:var(--panel);border-bottom:3px solid #ffe0b2;flex-shrink:0;scrollbar-width:none}
.scene-bar::-webkit-scrollbar{display:none}
.scene-btn{flex-shrink:0;background:#fff;border:3px solid #ffd54f;border-radius:14px;padding:6px 14px;font-family:'Fredoka One',cursive;font-size:.85rem;cursor:pointer;transition:transform .15s,background .15s;white-space:nowrap;color:#555}
.scene-btn.active{background:linear-gradient(135deg,#ffd54f,#ffb300);border-color:#fb8c00;color:#fff;transform:scale(1.08);box-shadow:0 3px 8px rgba(255,152,0,.4)}
main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;overflow:hidden}
svg.drawing{width:100%;max-height:100%;border-radius:18px;box-shadow:0 6px 24px rgba(0,0,0,.13);background:#fff;touch-action:none}
svg .region{cursor:pointer}
svg .region:active{filter:brightness(.84)}
.num-label{font-family:'Fredoka One',cursive;font-size:10px;fill:#111;pointer-events:none;user-select:none;paint-order:stroke;stroke:#fff;stroke-width:3.5px}
.celebrate{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .4s;z-index:20}
.celebrate.show{opacity:1}
.celebrate-text{font-family:'Fredoka One',cursive;font-size:2.8rem;color:#fff;background:linear-gradient(135deg,#ff6b9d,#ff9a3c);padding:18px 32px;border-radius:28px;box-shadow:0 8px 32px rgba(255,107,157,.5);text-align:center;animation:pop .4s cubic-bezier(.36,1.56,.64,1)}
@keyframes pop{0%{transform:scale(.3)}100%{transform:scale(1)}}
.confetti-wrap{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.confetti-piece{position:absolute;width:10px;height:12px;border-radius:3px;animation:fall 1.7s ease-in forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.palette-wrap{background:var(--panel);border-top:3px solid #ffe0b2;padding:10px 14px 16px;flex-shrink:0}
.palette-label{font-family:'Fredoka One',cursive;font-size:.75rem;color:#bbb;margin-bottom:8px;letter-spacing:.5px}
.palette{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.palette::-webkit-scrollbar{display:none}
.swatch{flex-shrink:0;width:48px;height:48px;border-radius:50%;border:4px solid transparent;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.swatch.active{border-color:#111;transform:scale(1.24);box-shadow:0 4px 14px rgba(0,0,0,.38)}
.swatch .snum{position:absolute;bottom:-19px;left:50%;transform:translateX(-50%);font-family:'Fredoka One',cursive;font-size:.72rem;color:#666;white-space:nowrap}
.palette-row{display:flex;align-items:flex-end;gap:8px}
.eraser-btn{flex-shrink:0;width:48px;height:48px;border-radius:50%;border:4px solid transparent;cursor:pointer;background:#f0f0f0;font-size:1.4rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.15);transition:transform .15s;position:relative}
.eraser-btn.active{border-color:#111;transform:scale(1.24)}
.eraser-btn .snum{position:absolute;bottom:-19px;left:50%;transform:translateX(-50%);font-family:'Fredoka One',cursive;font-size:.72rem;color:#666}
.controls-row{display:flex;justify-content:center;margin-top:16px}
.reset-btn{background:linear-gradient(135deg,#ef5350,#e53935);color:#fff;border:none;border-radius:30px;padding:10px 30px;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;box-shadow:0 4px 12px rgba(229,57,53,.35);transition:transform .15s}
.reset-btn:active{transform:scale(.94)}
</style>

const filled={};

function init(){
// scene bar
const bar=document.getElementById(‘sceneBar’);
SCENES.forEach((s,i)=>{
const b=document.createElement(‘button’);
b.className=‘scene-btn’+(i===0?’ active’:’’);
b.textContent=s.emoji+’ ‘+s.name;
b.onclick=()=>load(i);
bar.appendChild(b);
});
// palette
const pal=document.getElementById(‘palette’);
PAL.forEach(c=>{
const sw=document.createElement(‘div’);
sw.className=‘swatch’;
sw.style.background=c.hex;
if(c.hex===’#FFFFFF’) sw.style.outline=‘2px solid #ccc’;
sw.dataset.id=c.id;
sw.innerHTML=`<span class="snum">${c.id}</span>`;
sw.onclick=()=>pick(c);
pal.appendChild(sw);
});
document.getElementById(‘eraserBtn’).onclick=()=>pick(null);
document.getElementById(‘resetBtn’).onclick=()=>{filled[cur]={};render();};
load(0);
}

function pick(c){
sel=c;
document.querySelectorAll(’.swatch’).forEach(e=>e.classList.toggle(‘active’,e.dataset.id==c?.id));
document.getElementById(‘eraserBtn’).classList.toggle(‘active’,!c);
}

function load(i){
cur=i;
document.querySelectorAll(’.scene-btn’).forEach((b,j)=>b.classList.toggle(‘active’,j===i));
if(!filled[i]) filled[i]={};
render();
}

function render(){
const svg=document.getElementById(‘svg’);
svg.innerHTML=’’;
const {regions}=SCENES[cur], st=filled[cur];
regions.forEach(r=>{
const p=document.createElementNS(‘http://www.w3.org/2000/svg’,‘path’);
p.setAttribute(‘d’,r.d);
p.classList.add(‘region’);
const fc=st[r.id];
p.setAttribute(‘fill’,fc||’#e4e4e4’);
p.setAttribute(‘stroke’,’#111’);
p.setAttribute(‘stroke-width’,SW);
p.setAttribute(‘stroke-linejoin’,‘round’);
p.setAttribute(‘stroke-linecap’,‘round’);
p.onclick=()=>paint(r);
p.addEventListener(‘touchend’,e=>{e.preventDefault();paint(r);});
svg.appendChild(p);
if(!fc){
const t=document.createElementNS(‘http://www.w3.org/2000/svg’,‘text’);
t.setAttribute(‘x’,r.x); t.setAttribute(‘y’,r.y);
t.setAttribute(‘text-anchor’,‘middle’);
t.setAttribute(‘dominant-baseline’,‘middle’);
t.classList.add(‘num-label’);
t.textContent=r.c;
svg.appendChild(t);
}
});
}

function paint(r){
if(sel===null) delete filled[cur][r.id];
else filled[cur][r.id]=sel.hex;
render();
if(SCENES[cur].regions.every(r=>filled[cur][r.id])) celebrate();
}

function celebrate(){
stars++;
document.getElementById(‘starCount’).textContent=‘⭐ ‘+stars;
const el=document.getElementById(‘celebrate’);
el.classList.add(‘show’);
const w=document.getElementById(‘confettiWrap’);
w.innerHTML=’’;
const cc=[’#E53935’,’#FF8F00’,’#FDD835’,’#43A047’,’#1E88E5’,’#8E24AA’,’#F06292’];
for(let i=0;i<70;i++){
const p=document.createElement(‘div’);
p.className=‘confetti-piece’;
p.style.cssText=`left:${Math.random()*100}%;background:${cc[i%cc.length]};animation-delay:${Math.random()*.9}s;animation-duration:${1.2+Math.random()*.8}s;transform:rotate(${Math.random()*360}deg)`;
w.appendChild(p);
}
setTimeout(()=>el.classList.remove(‘show’),3200);
}

init();
</script>

</body>
</html>
