<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Color Fun! 🎨</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:#fff9f0;min-height:100vh;display:flex;flex-direction:column;overflow:hidden;touch-action:manipulation}
header{background:linear-gradient(135deg,#ff6b9d,#ff9a3c);padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 12px rgba(255,107,157,.35);flex-shrink:0}
header h1{font-family:'Fredoka One',cursive;font-size:1.6rem;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.15)}
.star-count{background:rgba(255,255,255,.28);border-radius:30px;padding:4px 12px;color:#fff;font-weight:900;font-size:1rem}
.scene-bar{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;background:#fff3e0;border-bottom:3px solid #ffe0b2;flex-shrink:0;scrollbar-width:none}
.scene-bar::-webkit-scrollbar{display:none}
.scene-btn{flex-shrink:0;background:#fff;border:3px solid #ffd54f;border-radius:14px;padding:6px 14px;font-family:'Fredoka One',cursive;font-size:.85rem;cursor:pointer;transition:transform .15s,background .15s;white-space:nowrap;color:#555}
.scene-btn.active{background:linear-gradient(135deg,#ffd54f,#ffb300);border-color:#fb8c00;color:#fff;transform:scale(1.08);box-shadow:0 3px 8px rgba(255,152,0,.4)}
main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;overflow:hidden;position:relative}
#colorCanvas{border-radius:18px;box-shadow:0 6px 24px rgba(0,0,0,.13);cursor:crosshair;display:block;max-width:100%;max-height:100%}
.celebrate{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .4s;z-index:20}
.celebrate.show{opacity:1}
.celebrate-text{font-family:'Fredoka One',cursive;font-size:2.8rem;color:#fff;background:linear-gradient(135deg,#ff6b9d,#ff9a3c);padding:18px 32px;border-radius:28px;box-shadow:0 8px 32px rgba(255,107,157,.5);text-align:center;animation:pop .4s cubic-bezier(.36,1.56,.64,1)}
@keyframes pop{0%{transform:scale(.3)}100%{transform:scale(1)}}
.confetti-wrap{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.confetti-piece{position:absolute;width:10px;height:12px;border-radius:3px;animation:fall 1.7s ease-in forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.palette-wrap{background:#fff3e0;border-top:3px solid #ffe0b2;padding:10px 14px 16px;flex-shrink:0}
.palette-label{font-family:'Fredoka One',cursive;font-size:.75rem;color:#bbb;margin-bottom:8px;letter-spacing:.5px}
.palette{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.palette::-webkit-scrollbar{display:none}
.swatch{flex-shrink:0;width:48px;height:48px;border-radius:50%;border:4px solid transparent;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.swatch.active{border-color:#111;transform:scale(1.24);box-shadow:0 4px 14px rgba(0,0,0,.38)}
.palette-row{display:flex;align-items:center;gap:8px}
.undo-btn{flex-shrink:0;width:48px;height:48px;border-radius:50%;border:4px solid transparent;cursor:pointer;background:#f0f0f0;font-size:1.4rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.15);transition:transform .15s;opacity:0.4}
.undo-btn:not([disabled]){opacity:1}
.controls-row{display:flex;justify-content:center;margin-top:12px}
.reset-btn{background:linear-gradient(135deg,#ef5350,#e53935);color:#fff;border:none;border-radius:30px;padding:10px 30px;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;box-shadow:0 4px 12px rgba(229,57,53,.35)}
.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.4rem;color:#ff9a3c;z-index:10;background:#fff9f0;border-radius:18px}
</style>
</head>
<body>
<header>
  <h1>🎨 Color Fun!</h1>
  <div class="star-count" id="starCount">⭐ 0</div>
</header>
<div class="scene-bar" id="sceneBar"></div>
<main>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="colorCanvas"></canvas>
    <div class="loading" id="loading">Loading... 🎨</div>
  </div>
  <div class="celebrate" id="celebrate">
    <div class="confetti-wrap" id="confettiWrap"></div>
    <div class="celebrate-text">🎉 Amazing!<br>You did it! ⭐</div>
  </div>
  <div class="palette-wrap">
    <div class="palette-label">TAP A COLOR, THEN TAP THE PICTURE!</div>
    <div class="palette-row">
      <div class="palette" id="palette"></div>
      <div class="undo-btn" id="undoBtn">↩️</div>
    </div>
    <div class="controls-row">
      <button class="reset-btn" id="resetBtn">🔄 Start Over</button>
    </div>
  </div>
</main>
<script>
const SCENES = [
  {name:'Penguin',  emoji:'🐧', src:'penguin.svg'},
  {name:'Farm',     emoji:'🌾', src:'farm.svg'},
  {name:'Ocean',    emoji:'🐠', src:'ocean.svg'},
  {name:'Sunshine', emoji:'☀️', src:'sun.svg'},
  {name:'House',    emoji:'🏠', src:'house.svg'},
];

const PAL = [
‘#FF0000’,’#FF7F00’,’#FFFF00’,’#00CC00’,’#0000FF’,’#8B4513’,
‘#FF69B4’,’#FF6347’,’#FFAA1D’,’#9ACD32’,’#00B2FF’,’#8A2BE2’,
‘#FC74FD’,’#000000’,’#808080’,’#FFFFFF’,’#C8A2C8’,’#7B3F00’,
‘#00755E’,’#1560BD’,’#FFDAB9’,’#FCE883’,’#FF355E’,’#76FF7A’,
];

const canvas   = document.getElementById(‘colorCanvas’);
const ctx      = canvas.getContext(‘2d’, {willReadFrequently: true});
let curColor   = PAL[0];
let curScene   = 0;
let stars      = 0;
let imgCache   = {};
let painted    = {};
let undoStack  = {};
const MAX_UNDO = 20;

/* ── palette ── */
function buildPalette(){
const pal = document.getElementById(‘palette’);
PAL.forEach((hex, i) => {
const sw = document.createElement(‘div’);
sw.className = ‘swatch’ + (i===0 ? ’ active’ : ‘’);
sw.style.background = hex;
if(hex === ‘#FFFFFF’) sw.style.outline = ‘2px solid #ccc’;
sw.onclick = () => {
curColor = hex;
document.querySelectorAll(’.swatch’).forEach(s => s.classList.remove(‘active’));
sw.classList.add(‘active’);
};
pal.appendChild(sw);
});
document.getElementById(‘undoBtn’).onclick = undo;
}

/* ── scene tabs ── */
function buildSceneBar(){
const bar = document.getElementById(‘sceneBar’);
SCENES.forEach((s, i) => {
const b = document.createElement(‘button’);
b.className = ‘scene-btn’ + (i===0 ? ’ active’ : ‘’);
b.textContent = s.emoji + ’ ’ + s.name;
b.onclick = () => switchScene(i);
bar.appendChild(b);
});
}

/* ── sizing ── */
function fitCanvas(img){
const wrap = document.getElementById(‘canvasWrap’);
const maxW = wrap.clientWidth  - 20;
const maxH = wrap.clientHeight - 20;
const ar   = img.naturalWidth / img.naturalHeight;
let w, h;
if(maxW / maxH > ar){ h = maxH; w = h * ar; }
else { w = maxW; h = w / ar; }
canvas.width  = Math.round(w);
canvas.height = Math.round(h);
canvas.style.width  = canvas.width  + ‘px’;
canvas.style.height = canvas.height + ‘px’;
}

/* ── draw ── */
function drawFresh(img){
ctx.fillStyle = ‘#ffffff’;
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
}

/* ── load scene ── */
function loadImage(src){
return new Promise((resolve, reject) => {
const img = new Image();
img.onload  = () => resolve(img);
img.onerror = () => reject(new Error(’Failed to load: ’ + src));
img.src = src;
});
}

async function switchScene(i){
curScene = i;
document.querySelectorAll(’.scene-btn’).forEach((b,j) => b.classList.toggle(‘active’, j===i));
document.getElementById(‘loading’).style.display = ‘flex’;

const src = SCENES[i].src;
if(!imgCache[src]){
imgCache[src] = await loadImage(src);
}

const img = imgCache[src];
fitCanvas(img);
if(painted[i]){
ctx.putImageData(painted[i], 0, 0);
} else {
drawFresh(img);
}
document.getElementById(‘loading’).style.display = ‘none’;
updateUndoBtn();
}

/* ── undo ── */
function pushUndo(){
if(!undoStack[curScene]) undoStack[curScene] = [];
const stack = undoStack[curScene];
stack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
if(stack.length > MAX_UNDO) stack.shift();
updateUndoBtn();
}

function undo(){
const stack = undoStack[curScene];
if(!stack || !stack.length) return;
ctx.putImageData(stack.pop(), 0, 0);
painted[curScene] = ctx.getImageData(0, 0, canvas.width, canvas.height);
updateUndoBtn();
}

function updateUndoBtn(){
const stack = undoStack[curScene];
const btn   = document.getElementById(‘undoBtn’);
btn.style.opacity = (stack && stack.length) ? ‘1’ : ‘0.4’;
}

function saveState(){
painted[curScene] = ctx.getImageData(0, 0, canvas.width, canvas.height);
}

/* ── flood fill ── */
function hexToRgb(hex){
return [
parseInt(hex.slice(1,3), 16),
parseInt(hex.slice(3,5), 16),
parseInt(hex.slice(5,7), 16),
255
];
}

function colorMatch(data, idx, target, tol=30){
return Math.abs(data[idx]   - target[0]) <= tol &&
Math.abs(data[idx+1] - target[1]) <= tol &&
Math.abs(data[idx+2] - target[2]) <= tol;
}

function isBlackish(data, idx){
return data[idx] < 80 && data[idx+1] < 80 && data[idx+2] < 80;
}

function floodFill(x, y, fillColor){
const w = canvas.width, h = canvas.height;
const imgData = ctx.getImageData(0, 0, w, h);
const data    = imgData.data;
const startIdx = (y * w + x) * 4;

if(isBlackish(data, startIdx)) return;

const target = [data[startIdx], data[startIdx+1], data[startIdx+2], data[startIdx+3]];
const fill   = hexToRgb(fillColor);

if(colorMatch(data, startIdx, fill, 5)) return;

const stack   = [x + y * w];
const visited = new Uint8Array(w * h);
visited[x + y * w] = 1;

while(stack.length){
const pos = stack.pop();
const px  = pos % w;
const py  = (pos - px) / w;
const idx = pos * 4;

```
if(!colorMatch(data, idx, target) || isBlackish(data, idx)) continue;

data[idx]   = fill[0];
data[idx+1] = fill[1];
data[idx+2] = fill[2];
data[idx+3] = 255;

const neighbors = [
  px > 0     ? pos - 1 : -1,
  px < w - 1 ? pos + 1 : -1,
  py > 0     ? pos - w : -1,
  py < h - 1 ? pos + w : -1,
];
for(const n of neighbors){
  if(n >= 0 && !visited[n]){ visited[n] = 1; stack.push(n); }
}
```

}
ctx.putImageData(imgData, 0, 0);
}

/* ── tap handling ── */
function doColor(clientX, clientY){
const rect   = canvas.getBoundingClientRect();
const scaleX = canvas.width  / rect.width;
const scaleY = canvas.height / rect.height;
const x = Math.floor((clientX - rect.left) * scaleX);
const y = Math.floor((clientY - rect.top)  * scaleY);
if(x < 0 || y < 0 || x >= canvas.width || y >= canvas.height) return;
pushUndo();
floodFill(x, y, curColor);
saveState();
}

canvas.addEventListener(‘click’, e => doColor(e.clientX, e.clientY));

let touchStartX, touchStartY, touchStartTime, touchCount = 0;

canvas.addEventListener(‘touchstart’, e => {
touchCount  = e.touches.length;
if(e.touches.length === 1){
touchStartX    = e.touches[0].clientX;
touchStartY    = e.touches[0].clientY;
touchStartTime = Date.now();
}
}, {passive: true});

canvas.addEventListener(‘touchend’, e => {
if(touchCount !== 1) return;
const dt   = Date.now() - touchStartTime;
const dx   = e.changedTouches[0].clientX - touchStartX;
const dy   = e.changedTouches[0].clientY - touchStartY;
const dist = Math.sqrt(dx*dx + dy*dy);
if(dt < 400 && dist < 10){
e.preventDefault();
doColor(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}
}, {passive: false});

/* ── reset ── */
document.getElementById(‘resetBtn’).onclick = () => {
delete painted[curScene];
delete undoStack[curScene];
const img = imgCache[SCENES[curScene].src];
if(img) drawFresh(img);
updateUndoBtn();
};

/* ── resize ── */
window.addEventListener(‘resize’, () => {
const img = imgCache[SCENES[curScene].src];
if(!img) return;
fitCanvas(img);
if(painted[curScene]) ctx.putImageData(painted[curScene], 0, 0);
else drawFresh(img);
});

/* ── celebrate ── */
function celebrate(){
stars++;
document.getElementById(‘starCount’).textContent = ‘⭐ ’ + stars;
const el = document.getElementById(‘celebrate’);
el.classList.add(‘show’);
const w  = document.getElementById(‘confettiWrap’);
w.innerHTML = ‘’;
const cc = [’#E53935’,’#FF8F00’,’#FDD835’,’#43A047’,’#1E88E5’,’#8E24AA’,’#F06292’];
for(let i = 0; i < 70; i++){
const p = document.createElement(‘div’);
p.className = ‘confetti-piece’;
p.style.cssText = `left:${Math.random()*100}%;background:${cc[i%cc.length]};animation-delay:${Math.random()*.9}s;animation-duration:${1.2+Math.random()*.8}s;transform:rotate(${Math.random()*360}deg)`;
w.appendChild(p);
}
setTimeout(() => el.classList.remove(‘show’), 3200);
}

/* ── init ── */
buildPalette();
buildSceneBar();
switchScene(0);
</script>

</body>
</html>
